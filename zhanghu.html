<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡伴日记 - 创建账户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .account-container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo h1 {
            font-size: 26px;
            color: #333;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-methods {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .phone-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .phone-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .phone-btn svg {
            width: 20px;
            height: 20px;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }

        .social-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #f0f0f0;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .social-btn svg {
            width: 28px;
            height: 28px;
        }

        /* 微信绿色 */
        .wechat-btn svg {
            fill: #07c160;
        }

        /* QQ蓝色 */
        .qq-btn svg {
            fill: #12b7f5;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
            color: #999;
            font-size: 14px;
        }

        .guest-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #666;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .guest-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .guest-btn svg {
            width: 18px;
            height: 18px;
        }

        .tips {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #999;
            line-height: 1.6;
        }

        .tips a {
            color: #667eea;
            text-decoration: none;
        }

        .tips a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .account-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .social-btn {
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>
    <div class="account-container">
        <div class="logo">
            <h1>📝 卡伴日记</h1>
        </div>
        <p class="subtitle">创建账户，开启你的日记之旅</p>

        <div class="login-methods">
            <!-- 手机登录 -->
            <button class="phone-btn" onclick="handlePhoneLogin()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                    <line x1="12" y1="18" x2="12.01" y2="18"/>
                </svg>
                手机号注册/登录
            </button>

            <!-- 社交登录 -->
            <div class="social-login">
                <button class="social-btn wechat-btn" onclick="handleWechatLogin()" title="微信登录">
                    <svg viewBox="0 0 24 24">
                        <path d="M8.5 4.5C4.91 4.5 2 7.08 2 10.25c0 1.65.84 3.13 2.16 4.17-.12.53-.44 1.42-.51 1.65-.08.27.19.52.44.38.25-.14 1.23-.71 1.75-1.02.51.13 1.05.2 1.61.2.23 0 .45-.01.67-.04-.06-.37-.09-.74-.09-1.12 0-2.74 2.6-5 5.83-5 .38 0 .74.04 1.1.11-.46-2.43-2.98-4.28-5.96-4.28zM6.25 8.5c.69 0 1.25.56 1.25 1.25s-.56 1.25-1.25 1.25S5 10.44 5 9.75 5.56 8.5 6.25 8.5zm4.5 0c.69 0 1.25.56 1.25 1.25s-.56 1.25-1.25 1.25-1.25-.56-1.25-1.25.56-1.25 1.25-1.25zm6.25 2c-2.9 0-5.25 2.13-5.25 4.75s2.35 4.75 5.25 4.75c.52 0 1.02-.06 1.5-.17.47.28 1.34.78 1.56.9.22.12.46-.09.4-.32-.07-.2-.35-1-.46-1.49 1.22-.96 2-2.34 2-3.92 0-2.62-2.35-4.75-5.25-4.75zm-2 3c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm4 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z"/>
                    </svg>
                </button>
                <button class="social-btn qq-btn" onclick="handleQQLogin()" title="QQ登录">
                    <svg viewBox="0 0 24 24">
                        <path d="M19.8 8.6c-.3-.5-.7-1-1.2-1.4-.4-.4-.9-.7-1.4-1 .1-.4.2-.9.2-1.3 0-2.5-2-4.5-4.5-4.5-.7 0-1.4.2-2 .5-.6-.3-1.3-.5-2-.5C6.3.4 4.3 2.4 4.3 4.9c0 .5.1.9.2 1.3-.5.3-1 .6-1.4 1-.5.4-.9.9-1.2 1.4-.3.5-.5 1.1-.6 1.7-.1.6-.1 1.3 0 1.9.1.6.4 1.2.8 1.7.4.5.9.9 1.5 1.2-.1.4-.1.8 0 1.2.1.4.3.8.6 1.1.3.3.7.6 1.1.7.4.2.9.2 1.3.1.2.4.5.8.9 1.1.4.3.8.5 1.3.6.4.1.9.1 1.4 0 .4-.1.9-.3 1.3-.5.3-.3.6-.6.8-1 .2-.3.4-.7.5-1.1.4.2.9.2 1.3.1.4-.1.8-.4 1.1-.7.3-.3.5-.7.6-1.1.1-.4.1-.8 0-1.2.6-.3 1.1-.7 1.5-1.2.4-.5.7-1.1.8-1.7.1-.6.1-1.3 0-1.9-.1-.6-.3-1.2-.6-1.7z"/>
                        <circle cx="8" cy="9" r="1.2"/>
                        <circle cx="16" cy="9" r="1.2"/>
                        <path d="M10.5 12.5c0 .8.7 1.5 1.5 1.5s1.5-.7 1.5-1.5" fill="none" stroke="#12b7f5" stroke-width="0.8"/>
                    </svg>
                </button>
            </div>

            <div class="divider">
                <span>或</span>
            </div>

            <!-- 访客访问 -->
            <button class="guest-btn" onclick="handleGuestLogin()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 8v8m-4-4h8"/>
                </svg>
                继续以访客身份访问
            </button>
        </div>

        <div class="tips">
            登录即代表您已阅读并同意<br>
            <a href="#" onclick="showAgreement('service')">《卡伴日记服务协议》</a> 与
            <a href="#" onclick="showAgreement('privacy')">《卡伴日记隐私政策》</a>
        </div>

        <div class="footer">
            © 2026 卡伴日记 All Rights Reserved
        </div>
    </div>


    <script>
        // 登录成功后跳转到主应用
        function loginSuccess() {
            // 保存登录状态
            localStorage.setItem('isLoggedIn', 'true');
            // 跳转到主应用
            window.location.href = 'main.html';
        }

        // 手机号登录 - 跳转到登录页面
        function handlePhoneLogin() {
            window.location.href = 'SJHdenglu.html';
        }

        // 微信登录
        function handleWechatLogin() {
            console.log('微信登录');
            alert('正在跳转微信授权页面...\n登录成功后将进入应用');
            // 模拟登录成功
            setTimeout(() => {
                loginSuccess();
            }, 1000);
        }

        // QQ登录
        function handleQQLogin() {
            console.log('QQ登录');
            alert('正在跳转QQ授权页面...\n登录成功后将进入应用');
            // 模拟登录成功
            setTimeout(() => {
                loginSuccess();
            }, 1000);
        }

        // 访客访问
        function handleGuestLogin() {
            console.log('访客访问');
            alert('欢迎进入卡伴日记访客模式！\n访客模式下部分功能可能受限');
            // 访客也可以进入应用
            loginSuccess();
        }

        // 显示协议
        function showAgreement(type) {
            if (type === 'service') {
                alert('《卡伴日记服务协议》\n\n这里是服务协议的详细内容...');
            } else if (type === 'privacy') {
                alert('《卡伴日记隐私政策》\n\n这里是隐私政策的详细内容...');
            }
        }
    </script>
</body>
</html>
