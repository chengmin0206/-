<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡伴日记 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #333;
            font-weight: 600;
        }

        .logo p {
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }

        .login-methods {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .method-divider {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .method-divider::before,
        .method-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .method-divider span {
            color: #999;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .phone-login {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        .phone-verify-row {
            display: flex;
            gap: 10px;
        }

        .verify-btn {
            padding: 0 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .verify-btn:hover {
            background: #5568d3;
        }

        .verify-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .one-click-login {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .one-click-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .one-click-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .one-click-btn svg {
            width: 20px;
            height: 20px;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .agreement {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .agreement input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .agreement label {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            cursor: pointer;
            flex: 1;
        }

        .agreement label span {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }

        .agreement label span:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #999;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>📝 卡伴日记</h1>
            <p>记录生活，珍藏美好</p>
        </div>

        <div class="login-methods">
            <!-- 本机一键登录 -->
            <div class="one-click-login">
                <button class="one-click-btn" onclick="handleOneClickLogin()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    本机号码一键登录
                </button>
            </div>

            <div class="method-divider">
                <span>or</span>
            </div>

            <!-- 手机号验证码登录 -->
            <div class="phone-login">
                <div class="input-group">
                    <input type="tel" id="phone" placeholder="请输入手机号码" maxlength="11">
                </div>
                <div class="input-group phone-verify-row">
                    <input type="text" id="verifyCode" placeholder="请输入验证码" maxlength="6">
                    <button class="verify-btn" id="verifyBtn" onclick="sendVerifyCode()">获取验证码</button>
                </div>
                <button class="login-btn" id="loginBtn" onclick="handlePhoneLogin()" disabled>登 录</button>
            </div>
        </div>

        <div class="agreement">
            <input type="checkbox" id="agreementCheck" onchange="toggleLoginBtn()">
            <label for="agreementCheck">
                登录即代表您已阅读并同意
                <span onclick="showAgreement('service')">《卡伴日记服务协议》</span>
                与
                <span onclick="showAgreement('privacy')">《卡伴日记隐私政策》</span>
            </label>
        </div>

        <div class="footer">
            © 2026 卡伴日记 All Rights Reserved
        </div>
    </div>

    <script>
        let countdown = 0;
        let countdownTimer = null;

        // 登录成功后跳转到主应用
        function loginSuccess() {
            // 保存登录状态
            localStorage.setItem('isLoggedIn', 'true');
            // 跳转到主应用
            window.location.href = 'main.html';
        }

        // 发送验证码
        function sendVerifyCode() {
            const phone = document.getElementById('phone').value;
            const phoneRegex = /^1[3-9]\d{9}$/;

            if (!phoneRegex.test(phone)) {
                alert('请输入正确的手机号码');
                return;
            }

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            countdown = 60;

            // 模拟发送验证码
            console.log('发送验证码到:', phone);
            alert('验证码已发送，请注意查收');

            countdownTimer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒后重发`;
                if (countdown <= 0) {
                    clearInterval(countdownTimer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        }

        // 一键登录
        function handleOneClickLogin() {
            const agreed = document.getElementById('agreementCheck').checked;

            if (!agreed) {
                alert('请先勾选同意《卡伴日记服务协议》与《卡伴日记隐私政策》');
                return;
            }

            // 模拟一键登录
            console.log('执行本机一键登录');
            alert('正在获取本机号码...\n（实际项目中会调用运营商SDK）');
            // 登录成功
            setTimeout(() => {
                loginSuccess();
            }, 1000);
        }

        // 手机号登录
        function handlePhoneLogin() {
            const phone = document.getElementById('phone').value;
            const verifyCode = document.getElementById('verifyCode').value;
            const agreed = document.getElementById('agreementCheck').checked;

            const phoneRegex = /^1[3-9]\d{9}$/;

            if (!phoneRegex.test(phone)) {
                alert('请输入正确的手机号码');
                return;
            }

            if (!verifyCode || verifyCode.length !== 6) {
                alert('请输入正确的验证码');
                return;
            }

            if (!agreed) {
                alert('请先勾选同意《卡伴日记服务协议》与《卡伴日记隐私政策》');
                return;
            }

            // 模拟登录
            console.log('手机号登录:', phone, '验证码:', verifyCode);
            alert('登录成功！正在进入应用...');
            // 登录成功
            setTimeout(() => {
                loginSuccess();
            }, 1000);
        }

        // 切换登录按钮状态
        function toggleLoginBtn() {
            const agreed = document.getElementById('agreementCheck').checked;
            const phone = document.getElementById('phone').value;
            const verifyCode = document.getElementById('verifyCode').value;
            const phoneRegex = /^1[3-9]\d{9}$/;
            const btn = document.getElementById('loginBtn');

            btn.disabled = !(agreed && phoneRegex.test(phone) && verifyCode.length === 6);
        }

        // 监听输入变化
        document.getElementById('phone').addEventListener('input', toggleLoginBtn);
        document.getElementById('verifyCode').addEventListener('input', toggleLoginBtn);

        // 显示协议
        function showAgreement(type) {
            if (type === 'service') {
                alert('《卡伴日记服务协议》\n\n这里是服务协议的详细内容...');
            } else if (type === 'privacy') {
                alert('《卡伴日记隐私政策》\n\n这里是隐私政策的详细内容...');
            }
        }
    </script>
</body>
</html>
