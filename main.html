<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡伴日记</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
        }

        .splash-logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        .splash-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .splash-subtitle {
            font-size: 16px;
            opacity: 0.8;
        }

        .splash-btn {
            margin-top: 40px;
            padding: 15px 50px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .splash-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- 启动页 -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">📝</div>
        <div class="splash-title">卡伴日记</div>
        <div class="splash-subtitle">记录生活，珍藏美好</div>
        <button class="splash-btn" onclick="enterApp()">开始使用</button>
    </div>

    <div class="main-container" id="mainApp" style="display: none;">
        <!-- 主内容区 -->
        <div class="content-area" id="contentArea">
            <!-- 页面内容将通过JS加载 -->
        </div>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-page="diet">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span>饮食</span>
            </div>
            <div class="nav-item" data-page="weight">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span>体重</span>
            </div>
            <div class="nav-item" data-page="chat">
                <svg viewBox="0 0 24 24">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                </svg>
                <span>助手</span>
            </div>
            <div class="nav-item" data-page="recipes">
                <svg viewBox="0 0 24 24">
                    <path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-2v4.05h-2V1h-2v4.05H9V1H7v4.05H1.98l1.62 16.48c.1.82.79 1.46 1.63 1.46h6.71c.84 0 1.53-.64 1.63-1.46L12.54 5.05H18l1.06 17.94z"/>
                </svg>
                <span>食谱</span>
            </div>
            <div class="nav-item" data-page="profile">
                <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span>我的</span>
            </div>
        </nav>
    </div>

    <script src="main.js"></script>
</body>
</html>
