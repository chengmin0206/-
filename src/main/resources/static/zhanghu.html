<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡伴日记 - 创建账户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, #FFFFFF 0%, #E4F3D2 10%, #FCFDF8 30%, #FDFEF8 50%, #FCFCFA 70%, #F6F8F3 85%, #FFFFFF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .account-container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo h1 {
            font-size: 26px;
            color: #333;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-methods {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .phone-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #47D07E 0%, #36C46F 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .phone-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(71, 208, 126, 0.4);
        }

        .phone-btn svg {
            width: 20px;
            height: 20px;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }

        .social-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #f0f0f0;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            border-color: #47D07E;
        }

        .social-btn svg {
            width: 28px;
            height: 28px;
        }

        .wechat-btn svg {
            fill: #07c160;
        }

        .qq-btn svg {
            fill: #12b7f5;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
            color: #999;
            font-size: 14px;
        }

        .guest-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #666;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .guest-btn:hover {
            border-color: #47D07E;
            color: #47D07E;
            background: rgba(71, 208, 126, 0.05);
        }

        .guest-btn svg {
            width: 18px;
            height: 18px;
        }

        .tips {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #999;
            line-height: 1.6;
        }

        .tips a {
            color: #47D07E;
            text-decoration: none;
        }

        .tips a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .loading.active {
            display: flex;
        }

        @media (max-width: 480px) {
            .account-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .social-btn {
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>
<body>
    <div class="account-container">
        <div class="logo">
            <h1>📝 卡伴日记</h1>
        </div>
        <p class="subtitle">创建账户，开启你的日记之旅</p>

        <div class="login-methods">
            <!-- 手机登录 -->
            <button class="phone-btn" onclick="showPhoneLogin()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                    <line x1="12" y1="18" x2="12.01" y2="18"/>
                </svg>
                手机号注册/登录
            </button>

            <!-- 社交登录 -->
            <div class="social-login">
                <button class="social-btn wechat-btn" onclick="handleWechatLogin()" title="微信登录">
                    <svg viewBox="0 0 24 24">
                        <path d="M8.5 4.5C4.91 4.5 2 7.08 2 10.25c0 1.65.84 3.13 2.16 4.17-.12.53-.44 1.42-.51 1.65-.08.27.19.52.44.38.25-.14 1.23-.71 1.75-1.02.51.13 1.05.2 1.61.2.23 0 .67-.04.1-1.12-1.2-1.59c.06-.37-.09-.74-.09-1.12 0-2.74 2.6-5 5.83-5 .38 0 .74.04 1.1.11-.46-2.43-2.98-4.28-5.96-4.28zM6.25 8.5c.69 0 1.25.56 1.25 1.25s-.56 1.25-1.25 1.25S5 10.44 5 9.75 5.56 8.5 6.25 8.5zm4.5 0c.69 0 1.25.56 1.25 1.25s-.56 1.25-1.25 1.25-1.25-.56-1.25-1.25-1.25.56-1.25 1.25-1.25-1.25.56 1.25-1.25zm6.25 2c-2.9 0-5.25 2.13-5.25 4.75s2.35 4.75 5.25 4.75c.52 0 1.02-.06 1.5-.17.47.28 1.34.78 1.56.9.22.46-.09.4-.32-.4-.32 0-2.62-2-2.62 1.22-.96 2-2.34 2-3.92 0-2.62-2.35-4.75-5.25-4.75zm-2 3c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm4 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1z"/>
                    </svg>
                </button>
                <button class="social-btn qq-btn" onclick="handleQQLogin()" title="QQ登录">
                    <svg viewBox="0 0 24 24">
                        <path d="M19.8 8.6c-.3-.5-.7-1-1.2-1.4-.4-.4-.9-.7-1.4-1 .1-.4.2-.9.2-1.3 0-2.5-2-4.5-4.5-.7 0-1.4.2-2 .5-.6-.3-1.1-.9-1.2 1.4-.3.5-.7-1-.6-1.7-.1-.6-.1-1.3 0-1.9.1-.6.4-1.2 1.2 1.7c.4.5.9.9 1.5 1.2 1.7-.1.4-.2.9.6-1.1.7.4.2.9.2 1.3.1.4.4.2.9.6 1.1.7-.4.2-.8.1-1.2 0-1.2.6-.3 1.1-.7 1.5-1.2 1.7-.4.5-.9.9-1.5 1.2-1.2-.1-.4-.2-.9-.6-1.1-.7-.4-.2-.9.2-1.3.1-.4.4.2-.6.8-1-1 .2-.4.4-.9.2-1.3.1-.4-.2-.8-.5-1.1-.7.4-.2-.6.8-0-1.2.0-.6-.1-1.3 0-1.9.1-.6.4-1.1-.7 1.5-1.2 1.2-.1.4.2.9.6 1.1.7.4.2.9.2 1.3.1.4.4.2-.6.8-1 .2-.4.4-.9.2-1.3.1-.4-.2-.8-.5-1.1-.7-.4-.2-.6-.8-0-1.2 0-.6-.1-1.3 0-1.9.1-.6.4-1.1-.7 1.5-1.2 1.2-.1.4.2-.9.6 1.1.7.4.2.9.2 1.3.1.4.4.2-.6.8-1 .2-.4.4-.9.2-1.3.1-.4-.2-.8-.5-1.1-.7-.4-.2-.6-.8-0-1.2 0-.6-.1-1.3 0-1.9.1-.6.4-1.1-.7 1.5-1.2 1.2-.1.4.2-.9.6 1.1.7.4.2.9.2 1.3.1.4.4.2-.6.8-1 .2-.4.4-.9.2-1.3 1-.6-.3-1-1-.7 1.2-1.4.7.4.9.9 1.5 1.2 1.2-1.4 7-8 10 10-4.5 7-8 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        <circle cx="8" cy="9" r="1.2"/>
                        <circle cx="16" cy="9" r="1.2"/>
                        <path d="M10.5 12.5c0 .8.7 1.5 1.5 1.5s1.5-.7 1.5-1.5" fill="none" stroke="#12b7f5" stroke-width="0.8"/>
                    </svg>
                </button>
            </div>

            <div class="divider">
                <span>或</span>
            </div>

            <!-- 访客访问 -->
            <button class="guest-btn" onclick="handleGuestLogin()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 8v8m-4-4h8"/>
                </svg>
                继续以访客身份访问
            </button>
        </div>

        <div class="tips">
            登录即代表您已阅读并同意<br>
            <a href="#" onclick="showAgreement('service')">《卡伴日记服务协议》</a> 与
            <a href="#" onclick="showAgreement('privacy')">《卡伴日记隐私政策》</a>
        </div>

        <div class="footer">
            © 2026 卡伴日记 All Rights Reserved
        </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading" id="loading">
        <div style="text-align: center; color: white;">
            <div style="font-size: 48px; margin-bottom: 20px;">🔄</div>
            <div>加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        const TOKEN_KEY = 'kaban_token';

        // 显示加载
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        // 保存 Token
        function setToken(token) {
            localStorage.setItem(TOKEN_KEY, token);
        }

        // 通用请求
        async function apiRequest(url, options = {}) {
            const token = localStorage.getItem(TOKEN_KEY);
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };

            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch(`${API_BASE_URL}${url}`, {
                    ...options,
                    headers
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || '请求失败');
                }

                return data;
            } catch (error) {
                console.error('API 请求错误:', error);
                throw error;
            }
        }

        // 访客登录
        async function handleGuestLogin() {
            showLoading();
            try {
                const data = await apiRequest('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        phone: 'guest_' + Date.now(),
                        verifyCode: '123456',
                        loginType: 4
                    })
                });

                setToken(data.data);
                window.location.href = 'main.html';
            } catch (error) {
                hideLoading();
                alert('登录失败: ' + error.message);
            }
        }

        // 微信登录
        async function handleWechatLogin() {
            showLoading();
            try {
                const data = await apiRequest('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        phone: 'wechat_' + Date.now(),
                        verifyCode: '123456',
                        loginType: 2,
                        nickname: '微信用户',
                        avatar: 'https://thirdwx.qlogo.cn/mmopen/vi_32/Q0j4TwGTfTLk3Lm7LTsgo7WA/132'
                    })
                });

                setToken(data.data);
                window.location.href = 'main.html';
            } catch (error) {
                hideLoading();
                alert('登录失败: ' + error.message);
            }
        }

        // QQ登录
        async function handleQQLogin() {
            showLoading();
            try {
                const data = await apiRequest('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        phone: 'qq_' + Date.now(),
                        verifyCode: '123456',
                        loginType: 3,
                        nickname: 'QQ用户',
                        avatar: 'https://q1.qlogo.cn/g?b=qq&nk=9056&nt=1'
                    })
                });

                setToken(data.data);
                window.location.href = 'main.html';
            } catch (error) {
                hideLoading();
                alert('登录失败: ' + error.message);
            }
        }

        // 手机登录弹窗
        function showPhoneLogin() {
            const phone = prompt('请输入手机号:');
            if (!phone) return;

            const verifyCode = prompt('请输入验证码（测试环境请输入任意6位数字）:');
            if (!verifyCode) return;

            handlePhoneLogin(phone, verifyCode);
        }

        // 手机登录
        async function handlePhoneLogin(phone, verifyCode) {
            showLoading();
            try {
                const data = await apiRequest('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        phone: phone,
                        verifyCode: verifyCode,
                        loginType: 1
                    })
                });

                setToken(data.data);
                window.location.href = 'main.html';
            } catch (error) {
                hideLoading();
                alert('登录失败: ' + error.message);
            }
        }

        // 显示协议
        function showAgreement(type) {
            if (type === 'service') {
                alert('《卡伴日记服务协议》\n\n这里是服务协议的详细内容...');
            } else if (type === 'privacy') {
                alert('《卡伴日记隐私政策》\n\n这里是隐私政策的详细内容...');
            }
        }
    </script>
</body>
</html>
