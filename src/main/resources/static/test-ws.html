<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 测试 - 卡伴日记</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #f44336; color: white; }
        .btn-success { background: #4caf50; color: white; }
        input[type="text"] {
            padding: 10px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f5f5f5;
        }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-weight: bold;
        }
        .status.connected { background: #c8e6c9; color: #2e7d32; }
        .status.disconnected { background: #ffcdd2; color: #c62828; }
        .status.connecting { background: #fff9c4; color: #f57f17; }
    </style>
</head>
<body>
    <h1>🔌 WebSocket 连接测试</h1>

    <div class="section">
        <h3>1. 检查 Token</h3>
        <p>从 localStorage 读取的 Token:</p>
        <input type="text" id="tokenInput" placeholder="Token 将自动填充">
        <button class="btn-success" onclick="loadToken()">从 LocalStorage 加载</button>
    </div>

    <div class="section">
        <h3>2. 连接状态</h3>
        <div id="status" class="status disconnected">未连接</div>
        <button class="btn-primary" onclick="connect()">连接 WebSocket</button>
        <button class="btn-danger" onclick="disconnect()">断开连接</button>
    </div>

    <div class="section">
        <h3>3. 发送测试消息</h3>
        <input type="text" id="messageInput" placeholder="输入测试消息" value="你好">
        <button class="btn-primary" onclick="sendMessage()">发送</button>
    </div>

    <div class="section">
        <h3>4. 连接日志</h3>
        <button onclick="clearLog()">清空日志</button>
        <textarea id="log" readonly></textarea>
    </div>

    <script>
        let ws = null;
        const WS_URL = 'ws://localhost:8080/ws/chat';

        function log(message, type = 'info') {
            const textarea = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            textarea.value += `[${timestamp}] ${prefix} ${message}\n`;
            textarea.scrollTop = textarea.scrollHeight;
        }

        function loadToken() {
            const token = localStorage.getItem('kaban_token');
            document.getElementById('tokenInput').value = token || '未找到 Token';
            log(`Token: ${token ? '已找到 (' + token.substring(0, 20) + '...)' : '未找到'}`);
        }

        function updateStatus(state) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + state;
            switch (state) {
                case 'connected':
                    statusEl.textContent = '✅ 已连接';
                    break;
                case 'disconnected':
                    statusEl.textContent = '❌ 未连接';
                    break;
                case 'connecting':
                    statusEl.textContent = '🔄 连接中...';
                    break;
            }
        }

        function connect() {
            const token = document.getElementById('tokenInput').value;

            if (!token || token === '未找到 Token') {
                log('错误: 未找到 Token，请先登录', 'error');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                log('警告: WebSocket 已经连接', 'error');
                return;
            }

            const url = `${WS_URL}?token=${token}`;
            log(`尝试连接: ${url}`);
            updateStatus('connecting');

            ws = new WebSocket(url);

            ws.onopen = () => {
                log('WebSocket 连接成功！', 'success');
                updateStatus('connected');
            };

            ws.onmessage = (event) => {
                log(`收到消息: ${event.data}`, 'success');
            };

            ws.onerror = (error) => {
                log(`WebSocket 错误: ${error}`, 'error');
                log('请检查: 1) 后端是否启动 2) 端口 8080 是否正确 3) Token 是否有效', 'error');
            };

            ws.onclose = (event) => {
                log(`WebSocket 关闭: code=${event.code}, reason=${event.reason || '无原因'}`, 'error');
                updateStatus('disconnected');

                if (event.code === 1006) {
                    log('错误代码 1006: 连接异常关闭，可能是网络问题或后端未响应', 'error');
                } else if (event.code === 1008) {
                    log('错误代码 1008: Token 验证失败', 'error');
                }
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                log('主动断开连接');
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value;

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('错误: WebSocket 未连接', 'error');
                return;
            }

            try {
                const payload = JSON.stringify({ content: message });
                ws.send(payload);
                log(`发送消息: ${payload}`);
            } catch (error) {
                log(`发送失败: ${error}`, 'error');
            }
        }

        function clearLog() {
            document.getElementById('log').value = '';
        }

        // 页面加载时自动加载 Token
        loadToken();
        log('页面加载完成，点击"连接 WebSocket"开始测试');
    </script>
</body>
</html>
